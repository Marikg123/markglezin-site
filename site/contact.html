<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Mark Glezin — Commissions, Exhibitions &amp; Inquiries</title>
  <meta name="description" content="Contact figurative painter Mark Glezin for commissions, exhibition inquiries, gallery representation, or to purchase original paintings. Based in Tel Aviv, available worldwide.">
  <meta name="keywords" content="contact Mark Glezin, commission portrait, buy figurative paintings, art inquiry, gallery representation">
  <link rel="canonical" href="https://www.markglezin.com/contact.html">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Contact Mark Glezin">
  <meta property="og:description" content="Commission portraits, exhibition inquiries, or purchase original figurative paintings.">
  <meta property="og:url" content="https://www.markglezin.com/contact.html">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Left Sidebar -->
  <aside class="sidebar">
    <div class="site-title"><a href="index.html">Mark Glezin</a></div>
    <nav class="sidebar-nav">
      <a href="index.html">Home</a>
      <div class="nav-group" id="work-group">
        <a href="works.html">Work</a>
        <nav class="nav-sub" id="work-sub" aria-label="Work categories"></nav>
      </div>
      <div class="nav-gap"></div>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
    <div class="sidebar-social">
      <a href="https://www.facebook.com/MarkGlezinART/" target="_blank" rel="noopener" aria-label="Facebook">
        <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
      </a>
      <a href="https://www.instagram.com/markglezinart/" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
      </a>
    </div>
  </aside>

  <!-- Mobile Header -->
  <div class="mobile-header">
    <div class="mobile-title"><a href="index.html">Mark Glezin</a></div>
    <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>

  <!-- Mobile Nav Overlay -->
  <div class="mobile-nav" role="dialog" aria-label="Navigation">
    <button class="close-btn" aria-label="Close menu">×</button>
    <a href="index.html">Home</a>
    <a href="works.html">Work</a>
    <div class="mobile-sub" id="mobile-work-sub"></div>
    <a href="about.html">About</a>
    <a href="contact.html" class="active">Contact</a>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="contact-page">
      <p class="contact-intro">
        Please feel free to reach out with any questions or comments.<br><br>
        You can email me at <a href="mailto:marikg@gmail.com">marikg@gmail.com</a>,
        DM me on any social channel, or leave a message below.
      </p>

      <form
        id="contact-form"
        class="contact-form"
        data-endpoint="https://formspree.io/f/xgopvqlb"
        novalidate
      >
        <div class="form-row">
          <div class="form-group">
            <label for="first-name">First Name <span aria-hidden="true">*</span></label>
            <input type="text" id="first-name" name="first_name" required autocomplete="given-name">
          </div>
          <div class="form-group">
            <label for="last-name">Last Name <span aria-hidden="true">*</span></label>
            <input type="text" id="last-name" name="last_name" required autocomplete="family-name">
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address <span aria-hidden="true">*</span></label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="subject">Subject <span aria-hidden="true">*</span></label>
          <input type="text" id="subject" name="subject" required>
        </div>

        <div class="form-group">
          <label for="message">Message <span aria-hidden="true">*</span></label>
          <textarea id="message" name="message" rows="6" required></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit</button>
      </form>

      <div class="form-success" role="alert">
        Thank you for your message! I'll be in touch soon.
      </div>
    </div>
  </div>

  <script src="gallery.js"></script>
  <script>
  // Build Work submenu from gallery data
  (function(){
    if (!window.GALLERY) return;
    var cats = GALLERY.categories || [];
    ['work-sub','mobile-work-sub'].forEach(function(id){
      var el = document.getElementById(id);
      if (!el) return;
      cats.forEach(function(cat){
        var slug = cat.toLowerCase().replace(/\s+/g,'-');
        var a = document.createElement('a');
        a.href = 'works.html#' + slug;
        a.textContent = cat;
        el.appendChild(a);
      });
    });
  })();
  </script>
  <script src="js/main.js"></script>
</body>
</html>
