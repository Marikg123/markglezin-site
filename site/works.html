  <!-- Gallery data (auto-generated by build.py) -->
  <script src="gallery.js"></script>

  <script>
(function () {
  const data      = window.GALLERY || { categories: [], paintings: [] };
  const gallery   = document.getElementById('gallery');
  const workSub   = document.getElementById('work-sub');
  const mobileWS  = document.getElementById('mobile-work-sub');
  const paintings = data.paintings || [];
  const categories = data.categories || [];

  // ── Slug helpers ──────────────────────────────────────────────────────────
  function toSlug(cat) { return cat.toLowerCase().replace(/\s+/g, '-'); }
  function fromSlug(slug) {
    return categories.find(c => toSlug(c) === slug) || categories[0];
  }

  // ── Build sidebar sub-links ───────────────────────────────────────────────
  categories.forEach(cat => {
    const slug = toSlug(cat);
    [workSub, mobileWS].forEach(el => {
      if (!el) return;
      const a = document.createElement('a');
      a.href = '#' + slug;
      a.textContent = cat;
      a.dataset.cat = cat;
      el.appendChild(a);
    });
  });

  // ── Gallery rendering ─────────────────────────────────────────────────────
  // 3 equal-width columns, masonry-style (no wasted vertical space).
  // Images are distributed round-robin: 1→col1, 2→col2, 3→col3, 4→col1 …
  const NUM_COLS = 3;

  function buildItems(list) {
    gallery.innerHTML = '';

    // Remove any previous preload links
    document.querySelectorAll('link[data-gallery-preload]').forEach(l => l.remove());

    if (!list.length) { initLightboxClicks(); return; }

    // Preload first 6 thumbnails (2 rows) for instant display
    list.slice(0, 6).forEach(p => {
      const link = document.createElement('link');
      link.rel = 'preload';
      link.as = 'image';
      link.href = p.thumb || p.file;
      link.setAttribute('data-gallery-preload', '');
      document.head.appendChild(link);
    });

    // Create column containers
    const cols = [];
    for (let c = 0; c < NUM_COLS; c++) {
      const col = document.createElement('div');
      col.className = 'gallery-col';
      gallery.appendChild(col);
      cols.push(col);
    }

    // Distribute images round-robin across columns
    list.forEach((p, i) => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.dataset.title = p.title + (p.sold ? ' — Sold' : '');
      item.dataset.idx   = i;   // visual order for lightbox navigation
      item.dataset.full  = p.file;  // full-size for lightbox

      const img = document.createElement('img');
      img.src      = p.thumb || p.file;  // use thumbnail in grid
      img.alt      = p.title;
      img.width    = p.tw || p.w;
      img.height   = p.th || p.h;
      img.loading  = i < 9 ? 'eager' : 'lazy';
      img.decoding = 'async';
      if (i < 3) img.fetchPriority = 'high';

      item.appendChild(img);
      cols[i % NUM_COLS].appendChild(item);
    });
    initLightboxClicks();
  }

  // ── Filter ────────────────────────────────────────────────────────────────
  function setFilter(cat) {
    // Update sub-link active states
    document.querySelectorAll('#work-sub a, #mobile-work-sub a').forEach(a => {
      a.classList.toggle('active', a.dataset.cat === cat);
    });
    buildItems(cat ? paintings.filter(p => p.category === cat) : paintings);
  }

  function applyHash() {
    const slug = window.location.hash.slice(1);
    const cat  = slug ? fromSlug(slug) : (categories[0] || null);
    setFilter(cat);
  }

  // React to hash changes (sidebar link clicks — no page reload)
  window.addEventListener('hashchange', applyHash);

  // Initial render
  applyHash();

  // ── Lightbox ─────────────────────────────────────────────────────────────
  const lightbox  = document.getElementById('lightbox');
  const lbImg     = document.getElementById('lb-img');
  const lbCaption = document.getElementById('lb-caption');
  const lbSpinner = document.getElementById('lb-spinner');
  let items = [], idx = 0;
  let transitioning = false;          // blocks rapid clicks
  const FADE_MS = 250;                // matches CSS transition duration
  const SPINNER_DELAY = 300;          // show spinner only if load > 300ms

  function openLightbox(list, i) {
    items = list; idx = i;
    // Show immediately (no fade-in on first open)
    lbImg.classList.remove('fading');
    lbCaption.classList.remove('fading');
    showSlide(false);
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  // Load an image and resolve when ready (or use cache)
  function loadImage(src) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => resolve(src);
      img.onerror = () => resolve(src);
      img.src = src;
    });
  }

  // Preload the next and previous full-size images
  function preloadAdjacent() {
    if (items.length < 2) return;
    const prevIdx = (idx - 1 + items.length) % items.length;
    const nextIdx = (idx + 1) % items.length;
    [prevIdx, nextIdx].forEach(i => {
      const src = items[i].dataset.full || items[i].querySelector('img').src;
      const link = new Image();
      link.src = src;
    });
  }

  function showSlide(animate) {
    const it  = items[idx];
    const src = it.dataset.full || it.querySelector('img').src;
    const caption = it.dataset.title || '';

    if (!animate) {
      // Instant swap (used on first open)
      lbImg.src = src;
      lbImg.alt = caption;
      lbCaption.textContent = caption;
      preloadAdjacent();
      return;
    }

    // ── Animated transition ──
    transitioning = true;

    // 1. Fade out image + caption
    lbImg.classList.add('fading');
    lbCaption.classList.add('fading');

    // 2. After fade-out, swap src and wait for load
    setTimeout(() => {
      // Start loading new image
      let spinnerTimer = setTimeout(() => {
        lbSpinner.classList.add('visible');
      }, SPINNER_DELAY);

      // Update caption immediately (while faded out)
      lbCaption.textContent = caption;
      lbImg.alt = caption;

      loadImage(src).then(() => {
        clearTimeout(spinnerTimer);
        lbSpinner.classList.remove('visible');

        // 3. Set the new source and fade in
        lbImg.src = src;
        // Small rAF delay to ensure src swap registers before fade-in
        requestAnimationFrame(() => {
          lbImg.classList.remove('fading');
          lbCaption.classList.remove('fading');
          // Unlock after fade-in completes
          setTimeout(() => {
            transitioning = false;
            preloadAdjacent();
          }, FADE_MS);
        });
      });
    }, FADE_MS);
  }

  function closeLightbox() {
    transitioning = false;
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
    lbSpinner.classList.remove('visible');
    lbImg.classList.remove('fading');
    lbCaption.classList.remove('fading');
    // Delay clearing src so the close isn't jarring
    setTimeout(() => { if (!lightbox.classList.contains('open')) lbImg.src = ''; }, 300);
  }

  function navigate(dir) {
    if (transitioning) return;         // block rapid clicks
    idx = (idx + dir + items.length) % items.length;
    showSlide(true);
  }

  function initLightboxClicks() {
    // Sort by data-idx so lightbox arrows follow visual (row) order,
    // not DOM (column) order.
    const list = Array.from(gallery.querySelectorAll('.gallery-item'))
                      .sort((a, b) => a.dataset.idx - b.dataset.idx);
    list.forEach((el, i) => el.addEventListener('click', () => openLightbox(list, i)));
  }

  lightbox.querySelector('.lightbox-close').addEventListener('click', closeLightbox);
  lightbox.querySelector('.lightbox-prev').addEventListener('click', () => navigate(-1));
  lightbox.querySelector('.lightbox-next').addEventListener('click', () => navigate(1));
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape')     closeLightbox();
    if (e.key === 'ArrowLeft')  navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
  });

})();
  </script>
