  <!-- Gallery data (auto-generated by build.py) -->
  <script src="gallery.js"></script>

  <script>
(function () {
  const data      = window.GALLERY || { categories: [], paintings: [] };
  const gallery   = document.getElementById('gallery');
  const workSub   = document.getElementById('work-sub');
  const mobileWS  = document.getElementById('mobile-work-sub');
  const paintings = data.paintings || [];
  const categories = data.categories || [];

  // ── Slug helpers ──────────────────────────────────────────────────────────
  function toSlug(cat) { return cat.toLowerCase().replace(/\s+/g, '-'); }
  function fromSlug(slug) {
    return categories.find(c => toSlug(c) === slug) || categories[0];
  }

  // ── Build sidebar sub-links ───────────────────────────────────────────────
  categories.forEach(cat => {
    const slug = toSlug(cat);
    [workSub, mobileWS].forEach(el => {
      if (!el) return;
      const a = document.createElement('a');
      a.href = '#' + slug;
      a.textContent = cat;
      a.dataset.cat = cat;
      el.appendChild(a);
    });
  });

  // ── Gallery rendering ─────────────────────────────────────────────────────
  // 3 equal-width columns, masonry-style (no wasted vertical space).
  // Images are distributed round-robin: 1→col1, 2→col2, 3→col3, 4→col1 …
  const NUM_COLS = 3;

  function buildItems(list) {
    gallery.innerHTML = '';
    if (!list.length) { initLightboxClicks(); return; }

    // Create column containers
    const cols = [];
    for (let c = 0; c < NUM_COLS; c++) {
      const col = document.createElement('div');
      col.className = 'gallery-col';
      gallery.appendChild(col);
      cols.push(col);
    }

    // Distribute images round-robin across columns
    list.forEach((p, i) => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.dataset.title = p.title + (p.sold ? ' — Sold' : '');
      item.dataset.idx   = i;   // visual order for lightbox navigation

      const img = document.createElement('img');
      img.src     = p.file;
      img.alt     = p.title;
      img.loading = i < 9 ? 'eager' : 'lazy';

      item.appendChild(img);
      cols[i % NUM_COLS].appendChild(item);
    });
    initLightboxClicks();
  }

  // ── Filter ────────────────────────────────────────────────────────────────
  function setFilter(cat) {
    // Update sub-link active states
    document.querySelectorAll('#work-sub a, #mobile-work-sub a').forEach(a => {
      a.classList.toggle('active', a.dataset.cat === cat);
    });
    buildItems(cat ? paintings.filter(p => p.category === cat) : paintings);
  }

  function applyHash() {
    const slug = window.location.hash.slice(1);
    const cat  = slug ? fromSlug(slug) : (categories[0] || null);
    setFilter(cat);
  }

  // React to hash changes (sidebar link clicks — no page reload)
  window.addEventListener('hashchange', applyHash);

  // Initial render
  applyHash();

  // ── Lightbox ─────────────────────────────────────────────────────────────
  const lightbox  = document.getElementById('lightbox');
  const lbImg     = document.getElementById('lb-img');
  const lbCaption = document.getElementById('lb-caption');
  let items = [], idx = 0;

  function openLightbox(list, i) {
    items = list; idx = i; showSlide();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function showSlide() {
    const it  = items[idx];
    const img = it.querySelector('img');
    lbImg.src = img.src || img.dataset.src || '';
    lbImg.alt = it.dataset.title;
    lbCaption.textContent = it.dataset.title || '';
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
    lbImg.src = '';
  }
  function navigate(dir) {
    idx = (idx + dir + items.length) % items.length;
    showSlide();
  }

  function initLightboxClicks() {
    // Sort by data-idx so lightbox arrows follow visual (row) order,
    // not DOM (column) order.
    const list = Array.from(gallery.querySelectorAll('.gallery-item'))
                      .sort((a, b) => a.dataset.idx - b.dataset.idx);
    list.forEach((el, i) => el.addEventListener('click', () => openLightbox(list, i)));
  }

  lightbox.querySelector('.lightbox-close').addEventListener('click', closeLightbox);
  lightbox.querySelector('.lightbox-prev').addEventListener('click', () => navigate(-1));
  lightbox.querySelector('.lightbox-next').addEventListener('click', () => navigate(1));
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape')     closeLightbox();
    if (e.key === 'ArrowLeft')  navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
  });

})();
  </script>

  <script src="js/main.js"></script>
</body>
