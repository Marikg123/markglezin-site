  // Build Work submenu from gallery data

    ['work-sub','mobile-work-sub'].forEach(function(id){

      if (!el) return;
      cats.forEach(function(cat){
        var slug = cat.toLowerCase().replace(/\s+/g,'-');
        var a = document.createElement('a');
        a.href = 'works.html#' + slug;
        a.textContent = cat;
        el.appendChild(a);
      });
    });
  })();
